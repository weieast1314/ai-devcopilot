{
  "version": "1.1.0",
  "providers": {
    "local": {
      "type": "internal",
      "description": "AI DevCopilot 内置 Skill 提供方"
    },
    "superpowers": {
      "type": "external",
      "description": "superpowers 过程型 Skill 提供方"
    }
  },
  "atoms": [
    { "name": "entry-router", "category": "analysis", "version": "1.0.0", "provider": "local", "description": "顶层路由入口，判断用户输入触发哪个 Pipeline" },
    { "name": "input-detect", "category": "analysis", "version": "1.1.0", "provider": "local", "description": "自动识别输入类型并路由（组合层内部组件）" },
    { "name": "requirement-extract", "category": "analysis", "version": "1.0.0", "provider": "local", "description": "从文字描述提取需求信息" },
    { "name": "requirement-parse", "category": "analysis", "version": "1.0.0", "provider": "local", "description": "统一解析需求为标准结构" },
    { "name": "feishu-doc-fetch", "category": "feishu", "version": "1.0.0", "provider": "local", "description": "获取飞书文档内容" },
    { "name": "git-branch-create", "category": "git", "version": "1.0.0", "provider": "local", "description": "创建符合规范的分支" },
    { "name": "git-branch-validate", "category": "git", "version": "1.0.0", "provider": "local", "description": "验证分支命名规范" },
    { "name": "jenkins-trigger", "category": "devops", "version": "1.0.0", "provider": "local", "description": "触发 Jenkins 构建" },
    { "name": "sql-migration", "category": "devops", "version": "1.0.0", "provider": "local", "description": "生成 SQL 迁移脚本" },
    { "name": "nacos-config", "category": "devops", "version": "1.0.0", "provider": "local", "description": "管理 Nacos 配置" },
    { "name": "update-memory", "category": "memory", "version": "1.0.0", "provider": "local", "description": "更新项目记忆" }
  ],
  "composites": [
    {
      "name": "requirement-fetch",
      "category": "workflow",
      "version": "1.0.0",
      "dependsOn": ["input-detect", "feishu-doc-fetch", "requirement-extract", "requirement-parse"],
      "providerPolicy": {
        "preferred": "local",
        "fallback": "local"
      },
      "description": "多来源需求获取"
    },
    {
      "name": "requirement-to-branch",
      "category": "workflow",
      "version": "1.0.0",
      "dependsOn": ["git-branch-create", "git-branch-validate"],
      "providerPolicy": {
        "preferred": "local",
        "fallback": "local"
      },
      "description": "需求转分支"
    }
  ],
  "pipelines": [
    {
      "name": "dev-flow",
      "version": "1.5.0",
      "dependsOn": ["requirement-fetch", "requirement-to-branch"],
      "stageProviderPolicy": {
        "sessionPreflight": "using-superpowers",
        "projectRouter": "entry-router",
        "stageRequiredProvider": "superpowers",
        "onMissing": "blocking"
      },
      "description": "标准开发流程（阶段能力由 superpowers 强制提供）"
    },
    {
      "name": "hotfix-flow",
      "version": "1.5.0",
      "dependsOn": ["requirement-fetch", "requirement-to-branch"],
      "stageProviderPolicy": {
        "sessionPreflight": "using-superpowers",
        "projectRouter": "entry-router",
        "stageRequiredProvider": "superpowers",
        "onMissing": "blocking"
      },
      "description": "热修复流程（阶段能力由 superpowers 强制提供）"
    }
  ],
  "capabilityRefs": {
    "matrix": "capabilities/capability-matrix.json",
    "fallbacks": "capabilities/fallback-rules.json"
  }
}
