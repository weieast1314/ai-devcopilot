## 能力矩阵与降级规则

能力定义与完整清单维护在：
- `capabilities/capability-matrix.json`
- `capabilities/fallback-rules.json`

### 核心对象能力摘要

| 对象 | 必需能力 | 可选能力 | 缺失时的默认处理 |
|------|----------|----------|------------------|
| `dev-flow` | `file.read`, `file.write` | `shell.exec`, `mcp.lark`, `web.fetch`, `interaction.ask_followup`, `state.persistence`, `code.review` | 缺少结构化交互时退化为纯文本确认；缺少状态持久化时仅保留会话内状态；缺少命令执行时停止自动验证/交付并输出手动命令 |
| `hotfix-flow` | `file.read`, `file.write` | `shell.exec`, `interaction.ask_followup`, `state.persistence`, `code.review` | 缺少命令执行时仅保留修复方案与手动交付指引 |
| `requirement-fetch` | `file.read` + (`mcp.lark` 或 `web.fetch`) | `interaction.ask_followup` | 无法远程取文档时退化为让用户粘贴需求原文 |
| `writing-plans` | `file.read` | `interaction.ask_followup`, `state.persistence` | 结构化确认退化为普通文本确认；无状态持久化时仅保留当前会话计划 |
| `code-verification` | `shell.exec` | `code.review`, `interaction.ask_followup` | 无命令执行时仅输出手动验证命令；无审查能力时只做编译/测试 |
| `code-delivery` | `shell.exec` | `interaction.ask_followup` | 无命令执行时仅输出 Git/Jenkins/PR 手动交付步骤 |
| `feishu-doc-fetch` | `mcp.lark` 或 `web.fetch` | - | 两者都缺失时要求用户手动粘贴飞书文档内容 |

## 版本规范

### 版本号格式

```
MAJOR.MINOR.PATCH

MAJOR: 不兼容的 API 修改
MINOR: 向后兼容的功能新增
PATCH: 向后兼容的问题修复
```

### 升级规则

1. **原子 Skill 升级**
   - PATCH: 修复 bug，不改变接口
   - MINOR: 新增可选功能，保持兼容
   - MAJOR: 接口变更，需同步更新依赖方

2. **组合 Skill 升级**
   - 依赖变更时同步更新版本
   - 记录依赖版本范围

3. **Pipeline 升级**
   - 流程变更时更新版本
   - 记录完整依赖树
